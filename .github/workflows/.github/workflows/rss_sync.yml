name: 每日同步RSS剧集

on:
  schedule:
    - cron: '0 22 * * *' # 每天北京时间早上6点执行
  workflow_dispatch:      # 允许你手动点击运行

jobs:
  sync_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # 关键：允许脚本修改并提交代码
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install feedparser

      - name: 执行同步
        run: python update_rss.py

      - name: 自动提交更新
        run: |
          git config --global user.name "Action-Bot"
          git config --global user.email "bot@github.com"
          git add default.json
          git commit -m "Auto update RSS: $(date)" || exit 0
          git push
